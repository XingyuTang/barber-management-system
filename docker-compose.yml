services:
  mysql:
    image: mysql:8.4
    container_name: barber-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: barber_management
      MYSQL_USER: barber_user
      MYSQL_PASSWORD: barber_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: